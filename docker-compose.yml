version: '3.8'

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs

services:
  # --- THE BOUNCER (Anomaly Detector, Blocker, & Unbanner) ---
  detector:
    build: ./detector
    container_name: log-detector
    restart: unless-stopped
    privileged: true              # Required to execute 'iptables' commands
    network_mode: "host"          # Required to see real source IPs and manage host firewall
    env_file:
      - .env                      # 🔒 INJECTS YOUR SECRETS (Slack URL, Home IP)
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro    # Shared named volume (Read-Only)
      - ./detector/audit.log:/app/audit.log # Persist ban/unban history (ensure WORKDIR is /app in your Dockerfile)
    environment:
      - PYTHONUNBUFFERED=1        # Forces real-time log output
    depends_on:
      - nginx

  # --- THE GATEKEEPER (Nginx Reverse Proxy) ---
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx       # Shared named volume (Write access)
    depends_on:
      - nextcloud

  # --- THE APP (Your Custom Nextcloud) ---
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    restart: always
