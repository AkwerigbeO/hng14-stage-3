# HNG Stage 3 Configuration
logging:
  log_file_path: "/var/log/nginx/hng-access.log"
  audit_log_path: "audit.log"

security:
  whitelist:
    - "127.0.0.1"
    - "YOUR_HOME_IP_HERE"
  default_ban_time: 10 # minutes
  backoff_multiplier: 2

notifications:
  slack_webhook_url: "YOUR_SLACK_WEBHOOK_HERE"

thresholds:
  z_score_limit: 3.0
  rate_multiplier: 5
