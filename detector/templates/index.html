<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Stage 3 - Anomaly Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-blue: #2196f3;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --danger: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid var(--accent-blue);
        }

        .card h2 {
            margin-top: 0;
            color: var(--accent-blue);
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }

        .stat-label { color: var(--text-dim); }
        .stat-value { font-weight: bold; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th { text-align: left; color: var(--text-dim); padding: 8px; font-size: 14px; }
        td { padding: 8px; border-top: 1px solid #333; }

        .banned-list {
            list-style: none;
            padding: 0;
        }

        .banned-item {
            color: var(--danger);
            background: rgba(244, 67, 54, 0.1);
            padding: 5px 10px;
            border-radius: 4px;
            margin-bottom: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Security Engine Dashboard</h1>
    </div>

    <div class="grid">
        <div class="card">
            <h2>System</h2>
            <div class="stat-row">
                <span class="stat-label">CPU:</span>
                <span id="cpu" class="stat-value">0%</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">RAM:</span>
                <span id="memory" class="stat-value">0%</span>
            </div>
        </div>

        <div class="card">
            <h2>Global Traffic</h2>
            <div class="stat-row">
                <span class="stat-label">Current RPS:</span>
                <span id="global_rps" class="stat-value">0.00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Baseline Mean:</span>
                <span id="mean" class="stat-value">0.00</span>
            </div>
        </div>

        <div class="card">
            <h2>Stats</h2>
            <div class="stat-row">
                <span class="stat-label">Banned IPs:</span>
                <span id="banned_count" class="stat-value">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Z-Score Threshold:</span>
                <span id="threshold" class="stat-value">3.0</span>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Top 10 Source IPs (Last 60s)</h2>
            <table>
                <thead>
                    <tr>
                        <th>IP Address</th>
                        <th>Requests</th>
                    </tr>
                </thead>
                <tbody id="top_ips_body">
                    </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Currently Banned</h2>
            <div id="banned_list" class="banned-list">
                </div>
        </div>
    </div>

    <script>
        function updateDashboard() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    // Update simple text fields
                    document.getElementById('cpu').innerText = data.cpu + '%';
                    document.getElementById('memory').innerText = data.memory + '%';
                    document.getElementById('global_rps').innerText = data.global_rps.toFixed(2);
                    document.getElementById('mean').innerText = data.mean.toFixed(2);
                    document.getElementById('banned_count').innerText = data.banned_ips.length;

                    // Update Top IPs Table
                    const tableBody = document.getElementById('top_ips_body');
                    tableBody.innerHTML = '';
                    if (data.top_ips.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="2" style="color:#666">No traffic detected</td></tr>';
                    } else {
                        data.top_ips.forEach(item => {
                            const row = `<tr><td>${item[0]}</td><td>${item[1]}</td></tr>`;
                            tableBody.innerHTML += row;
                        });
                    }

                    // Update Banned List
                    const bannedDiv = document.getElementById('banned_list');
                    bannedDiv.innerHTML = '';
                    if (data.banned_ips.length === 0) {
                        bannedDiv.innerHTML = '<div style="color:#666">No active bans</div>';
                    } else {
                        data.banned_ips.forEach(ip => {
                            bannedDiv.innerHTML += `<div class="banned-item">${ip}</div>`;
                        });
                    }
                })
                .catch(err => console.error('Dashboard sync error:', err));
        }

        // Update every 3 seconds
        setInterval(updateDashboard, 3000);
        // Initial load
        updateDashboard();
    </script>
</body>
</html>
